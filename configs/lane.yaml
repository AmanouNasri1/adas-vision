# Lane / drivable-area (classical CV) configuration — loaded via utils/config.py.
# Honest limits: classical CV — fragile on faded markings, glare, and sharp
# curves (see docs/limitations.md). A hook is left for a future segmentation model.

# Trapezoid region-of-interest, as fractions of frame width/height. The ego lane
# is assumed lower-centre; this ROI doubles as the drivable-area fallback when no
# clear lane lines are found.

# Backend: "classical" (Canny + Hough, default) or "learned" (a fine-tuned
# YOLO-seg drivable-area model — see training/colab_lane_training.md). "learned"
# falls back to classical if the model file is missing or returns nothing.
method: learned

learned:
  model_path: models/lane_seg.pt   # drop your trained .pt / .onnx weights here
  imgsz: 640
  conf: 0.25

# The classical backend runs its CV ops at this fraction of frame size for speed
# (lane shape is unaffected; the polygon is scaled back to full resolution).
process_scale: 0.5

roi:
  bottom_width: 0.90   # ROI width at the bottom edge (fraction of W)
  top_width: 0.18      # ROI width at the horizon line (fraction of W)
  top_y: 0.62          # horizon line (fraction of H from top)
  bottom_y: 0.97       # bottom of ROI (fraction of H)

edges:
  blur_kernel: 5       # Gaussian blur size (forced odd)
  canny_low: 60
  canny_high: 150

hough:
  rho: 2               # px
  theta_deg: 1         # degrees
  threshold: 25        # min votes
  min_line_length: 18  # px
  max_line_gap: 120    # px

lines:
  min_abs_slope: 0.5   # discard near-horizontal segments
  max_abs_slope: 6.0   # discard near-vertical noise

# White / yellow lane-marking colour masks, fused with the edge map so the
# detector locks onto actual paint instead of random clutter.
color:
  enabled: true
  white_l_min: 200             # HLS lightness threshold for white markings
  yellow_hls_min: [15, 90, 80]
  yellow_hls_max: [40, 255, 255]

# Temporal smoothing: exponentially average each lane edge across frames and keep
# the last good edge briefly through dropouts -> a stable, non-flickering overlay.
smoothing:
  alpha: 0.3        # EMA weight for the new fit (lower = smoother, laggier)
  max_misses: 12    # keep a lane edge this many frames after it was last seen
